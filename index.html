<!doctype html>
<html class="no-js" 
lang="en">

<head>
  <meta charset="utf-8">
  <title>Tamagotchi Simulator</title>
  <meta name="description" content="">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta property="og:title" content="">
  <meta property="og:type" content="">
  <meta property="og:url" content="">
  <meta property="og:image" content="">

  <link rel="manifest" href="site.webmanifest">
  <link rel="icon" type="image/png" href="img/favicon.png">
  <!-- Place favicon.ico in the root directory -->

  <link rel="stylesheet" href="css/normalize.css">
  <link rel="stylesheet" href="css/main.css">

  <meta name="theme-color" content="#fafafa">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>

<body>
  <div class="device">
  <div class="screen">
    <div class="egg-wrapper">
    <!-- Egg background (always visible) -->
    <img id="egg" src="img/egg.png" />

    <!-- Pet layered on top -->
    <img id="pet" src="img/normal.png" />

    <!-- Buttons ON the egg -->
    <img id="feed" class="btn" src="img/nbutton1.png" />
    <img id="feed" class="btn" src="img/nbutton2.png" /> 
    <img id="feed" class="btn" src="img/nbutton3.png" />
  </div>

    <div class="dialogue-box">
    <p id="mood">...</p>
  </div>

  <div id="name-popup">
    <div class="name-box">
      <p>Name your Tamagotchi!</p>
      <input type="text" id="pet-name-input" placeholder="Enter name..." />
      <button id="start-btn">Start</button>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

</body>
</html>
